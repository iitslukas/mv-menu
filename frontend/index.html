<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MV C2 Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #e4e4e7; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 15, 18, 0.6); backdrop-filter: blur(12px); }
        .server-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #1f1f23; }
        .server-card:hover { border-color: #3b82f6; transform: translateY(-4px); box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.3); }
        .pulse-green { box-shadow: 0 0 10px rgba(34, 197, 94, 0.4); }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 glass p-6 rounded-2xl border border-zinc-800/50">
            <div class="mb-4 md:mb-0">
                <h1 class="text-3xl font-black tracking-tighter text-white uppercase italic">SAVAGE <span class="text-blue-600">C2</span></h1>
                <p class="text-zinc-500 text-xs font-bold tracking-widest uppercase">Global Network Management</p>
            </div>
            <div class="flex items-center gap-6">
                <div class="text-right">
                    <div class="text-[10px] text-zinc-500 uppercase font-black tracking-tighter">API Status</div>
                    <div class="flex items-center gap-2 text-green-500 font-mono text-xs font-bold">
                        <span class="relative flex h-2 w-2">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                        </span>
                        ENCRYPTED CONNECTION
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass p-6 rounded-2xl border border-zinc-800/50 relative overflow-hidden">
                <div class="text-zinc-500 text-[10px] font-black uppercase tracking-widest">Infected Nodes</div>
                <div class="text-4xl font-black mt-1 text-white" id="count-servers">0</div>
                <i class="fa-solid fa-network-wired absolute -right-4 -bottom-4 text-zinc-800/20 text-6xl"></i>
            </div>
            <div class="glass p-6 rounded-2xl border border-zinc-800/50 relative overflow-hidden">
                <div class="text-zinc-500 text-[10px] font-black uppercase tracking-widest">Connected Souls</div>
                <div class="text-4xl font-black mt-1 text-blue-500" id="count-players">0</div>
                <i class="fa-solid fa-users absolute -right-4 -bottom-4 text-zinc-800/20 text-6xl"></i>
            </div>
            <div class="glass p-6 rounded-2xl border border-zinc-800/50 relative overflow-hidden">
                <div class="text-zinc-500 text-[10px] font-black uppercase tracking-widest">Master System</div>
                <div class="text-4xl font-black mt-1 text-white uppercase italic">Linux/Win</div>
                <i class="fa-solid fa-microchip absolute -right-4 -bottom-4 text-zinc-800/20 text-6xl"></i>
            </div>
        </div>

        <h2 class="text-sm font-black mb-6 flex items-center gap-2 text-zinc-500 uppercase tracking-widest">
            <i class="fa-solid fa-skull-crossbones text-blue-600"></i> Active Targets
        </h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="server-grid">
            </div>
    </div>

    <script>
    async function updateDashboard() {
        try {
            const response = await fetch('/api/list');
            if (!response.ok && response.status !== 304) throw new Error('C2 Offline');

            const servers = await response.json();
            const grid = document.getElementById('server-grid');
            
            // Stats update
            document.getElementById('count-servers').innerText = servers.length;
            const totalPlayers = servers.reduce((acc, srv) => acc + (parseInt(srv.players) || 0), 0);
            document.getElementById('count-players').innerText = totalPlayers;

            if (servers.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-20 text-center text-zinc-600 border-2 border-dashed border-zinc-900 rounded-3xl">
                        <i class="fa-solid fa-satellite-dish text-4xl mb-4 animate-pulse"></i>
                        <p class="font-bold uppercase tracking-widest text-xs">Waiting for incoming signal...</p>
                    </div>`;
                return;
            }

            grid.innerHTML = '';
            servers.forEach(srv => {
                const card = document.createElement('div');
                card.className = 'server-card glass p-5 rounded-2xl relative overflow-hidden';
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div class="bg-blue-600/10 text-blue-500 text-[10px] font-black px-2 py-1 rounded-md uppercase tracking-tighter">Node Online</div>
                        <span class="text-zinc-600 text-[10px] font-mono">${srv.lastSeen}</span>
                    </div>
                    <h3 class="text-white font-black text-lg truncate mb-1 uppercase tracking-tighter">${srv.hostname}</h3>
                    <p class="text-zinc-500 text-xs font-mono mb-6">${srv.ip}</p>
                    
                    <div class="flex items-center justify-between py-3 border-t border-zinc-800/50">
                        <div class="flex items-center gap-2">
                            <i class="fa-solid fa-users text-blue-500 text-xs"></i>
                            <span class="text-sm font-bold text-zinc-300">${srv.players} <span class="text-zinc-600 font-normal italic">players</span></span>
                        </div>
                        <button onclick="location.href='manage.html?ip=${srv.ip}&name=${encodeURIComponent(srv.hostname)}'" 
                                class="bg-white text-black text-[10px] font-black px-4 py-2 rounded-lg hover:bg-blue-600 hover:text-white transition-all uppercase tracking-widest">
                            Manage
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });

        } catch (err) {
            console.error(err);
        }
    }

    setInterval(updateDashboard, 5000);
    updateDashboard();
    </script>
</body>
</html>
