<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MV C2 Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0b0b; color: #e4e4e7; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(10px); }
        .server-card { transition: all 0.3s ease; border: 1px solid #27272a; }
        .server-card:hover { border-color: #2700b3; transform: translateY(-2px); }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-10 glass p-6 rounded-2xl border border-zinc-800">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-white">MV <span class="text-blue-500">PANEL</span></h1>
                <p class="text-zinc-500 text-sm">System Control & Infection Dashboard</p>
            </div>
            <div class="text-right">
                <div class="text-xs text-zinc-500 uppercase font-bold">Status</div>
                <div class="flex items-center gap-2 text-green-500 font-mono">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                    </span>
                    C2 CONNECTED
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass p-6 rounded-xl border border-zinc-800">
                <div class="text-zinc-500 text-xs font-bold uppercase">Online Servers</div>
                <div class="text-3xl font-bold mt-1" id="count-servers">0</div>
            </div>
            <div class="glass p-6 rounded-xl border border-zinc-800">
                <div class="text-zinc-500 text-xs font-bold uppercase">Total Players</div>
                <div class="text-3xl font-bold mt-1" id="count-players">0</div>
            </div>
            <div class="glass p-6 rounded-xl border border-zinc-800">
                <div class="text-zinc-500 text-xs font-bold uppercase">System OS</div>
                <div class="text-3xl font-bold mt-1">WINDOWS</div>
            </div>
        </div>

        <h2 class="text-xl font-bold mb-4 flex items-center gap-2 text-zinc-400">
            <i class="fa-solid fa-server"></i> INFECTED NODES
        </h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="server-grid">
            <div class="col-span-full py-20 text-center text-zinc-600 border-2 border-dashed border-zinc-800 rounded-2xl">
                Čakám na prichádzajúce spojenia...
            </div>
        </div>
    </div>

    <script>
async function updateDashboard() {
    try {
        const response = await fetch('/api/list');
        
        // Ak server vráti 304 alebo 200, je to OK
        if (!response.ok && response.status !== 304) {
            throw new Error('Server neodpovedá správne');
        }

        const servers = await response.json();
        console.log("Prijaté dáta:", servers); 

        const listDiv = document.getElementById('server-list');
        
        if (servers.length === 0) {
            listDiv.innerHTML = '<p style="color: gray; text-align: center; width: 100%;">Momentálne nie sú aktívne žiadne servery.</p>';
            return;
        }

        listDiv.innerHTML = ''; // Vymažeme starý zoznam
        
        // --- TU JE TO DOPLNENÉ ---
        servers.forEach(srv => {
            const card = document.createElement('div');
            card.className = 'bg-gray-800 p-4 rounded-lg border border-green-500/30 shadow-lg mb-4 w-full md:w-64';
            card.innerHTML = `
                <div class="flex flex-col">
                    <span class="text-white font-bold text-lg border-b border-gray-700 pb-2 mb-2">${srv.hostname}</span>
                    <span class="text-green-400 text-sm">Hráči: <span class="text-white">${srv.players}</span></span>
                    <span class="text-gray-500 text-xs mt-2">IP: ${srv.ip}</span>
                    <span class="text-gray-500 text-xs">Naposledy videný: ${srv.lastSeen}</span>
                </div>
            `;
            listDiv.appendChild(card);
        });

    } catch (err) {
        console.error("Chyba:", err);
        // Ak si predtým videl "Backend nie je dostupný", toto to vypíše do konzoly podrobnejšie
        document.getElementById('server-list').innerHTML = `<p style="color: red;">Chyba pripojenia: ${err.message}</p>`;
    }
}

// Spustíme hneď a potom každých 5 sekúnd
updateDashboard();
setInterval(updateDashboard, 5000);
    </script>
</body>
</html>
